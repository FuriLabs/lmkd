[lmkd]
# Memory pressure levels (oom_adj values)
medium=700
critical=100
low=1001

# Device characteristics
low_ram=false
kill_heaviest_task=true

# Kill behavior
kill_timeout_ms=25
use_minfree_levels=false
per_app_memcg=true

# Swap and memory thresholds
swap_free_low_percentage=15
swap_util_max=80
filecache_min_kb=204800

# PSI settings
use_psi=true
use_new_strategy=true
psi_partial_stall_ms=100
psi_complete_stall_ms=300
stall_limit_critical=150

# Thrashing detection
thrashing_limit=80
thrashing_limit_decay=20
thrashing_limit_critical=150

# Pressure upgrade/downgrade
critical_upgrade=false
upgrade_pressure=100
downgrade_pressure=100
