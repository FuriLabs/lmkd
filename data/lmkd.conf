[lmkd]
# These control when lmkd kills processes based on their oom_score_adj values
# Higher values = less aggressive (fewer kills)
# Lower values = more aggressive (more kills)
#
# Process score reference:
# -1000 to 0: System services (protected)
# 0-200: Active foreground apps
# 200-400: Visible/recent apps
# 400-600: Perceptible services
# 600-900: Background services
# 900-1000: Cached/least important apps

# Only kill cached apps (score 950+) during medium pressure
medium=950

# Kill background services (score 500+) during critical pressure
critical=500

# Disable low pressure kills (max score is 1000, so 1001 disables this level)
low=1001

# false = treat as normal RAM device
# true = treat as low-RAM device (simpler, more aggressive killing)
low_ram=false

# When multiple processes have same oom_score_adj, kill the heaviest one first
kill_heaviest_task=true

# Wait 500ms between kills to allow memory to be freed
kill_timeout_ms=500

# Use modern PSI-based killing instead of minfree levels
# false = modern approach, true = legacy thresholds
use_minfree_levels=false

# Give each app its own memory control group for precise tracking
# Enables better per-app memory management and statistics
per_app_memcg=true

# Consider swap "low" when <1% remains
# On 156MB swap: 1% = ~1.5MB, 5% = ~8MB
swap_free_low_percentage=1

# Allow up to 95% of swappable memory to be swapped out
# Higher values allow more swap usage before intervention
swap_util_max=95

# After thrashing events, keep killing until file cache reaches 25MB
# Lower = fewer kills after thrashing resolves
filecache_min_kb=25600

# Enable modern kernel pressure monitoring instead of legacy cgroup events
use_psi=true

# Use kill strategy based on watermarks, swap, and thrashing
use_new_strategy=true

# Trigger medium pressure when some processes stalled for 200ms/sec
# Time in milliseconds per second that triggers response
psi_partial_stall_ms=200

# Trigger critical pressure when all processes stalled for 500ms/sec
# Complete system stall threshold for emergency response
psi_complete_stall_ms=500

# Allow killing foreground apps when stall exceeds 300ms
# Higher values better protect foreground applications
stall_limit_critical=300

# Kill processes when file cache thrashing exceeds 180%
thrashing_limit=180

# Reduce thrashing threshold by 10% after each kill
thrashing_limit_decay=10

# Allow killing foreground apps when thrashing exceeds 250%
thrashing_limit_critical=250

# Disable automatic escalation from medium to critical pressure
critical_upgrade=false

# Memory pressure % threshold for upgrading pressure level
upgrade_pressure=100

# Memory pressure % threshold for downgrading pressure level
downgrade_pressure=100

# Additional processes to skip during registration
# This extends the built-in SKIP_PROCESS_NAMES array
# Use semicolon (;) as separator
# skip_processes=/usr/bin/my-custom-daemon;/opt/app/service;python3 /usr/local/bin/monitor.py;/usr/bin/important-service
