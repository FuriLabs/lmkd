[lmkd]
# Memory pressure levels (oom_adj values)
# low=1001 means disabled (OOM_SCORE_ADJ_MAX + 1)
# You can set low=900 to enable low pressure monitoring, or leave it disabled
medium=800
critical=0

# Device characteristics
low_ram=false
kill_heaviest_task=false

# Kill behavior
kill_timeout_ms=100
use_minfree_levels=false
per_app_memcg=false

# Swap and memory thresholds
swap_free_low_percentage=10
swap_util_max=100
filecache_min_kb=0

# PSI (Pressure Stall Information) settings
use_psi=true
use_new_strategy=true
psi_partial_stall_ms=70
psi_complete_stall_ms=700
stall_limit_critical=100

# Thrashing detection
thrashing_limit=100
thrashing_limit_decay=10
thrashing_limit_critical=200
