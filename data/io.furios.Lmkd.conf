<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
    <!-- Allow root to own the service -->
    <policy user="root">
        <allow own="io.furios.Lmkd"/>
        <allow send_destination="io.furios.Lmkd"/>
        <allow receive_sender="io.furios.Lmkd"/>
    </policy>

    <!-- Allow all users to receive signals from the service -->
    <policy context="default">
        <allow receive_sender="io.furios.Lmkd"
               receive_interface="io.furios.Lmkd"
               receive_type="signal"/>
        <allow send_destination="io.furios.Lmkd"
               send_interface="io.furios.Lmkd"
               send_type="method_call"/>
        <allow receive_sender="io.furios.Lmkd"
               receive_interface="io.furios.Lmkd"
               receive_type="method_return"/>
        <allow receive_sender="io.furios.Lmkd"
               receive_interface="io.furios.Lmkd"
               receive_type="error"/>
    </policy>

    <!-- Allow access to properties -->
    <policy context="default">
        <allow send_destination="io.furios.Lmkd"
               send_interface="org.freedesktop.DBus.Properties"/>
        <allow receive_sender="io.furios.Lmkd"
               receive_interface="org.freedesktop.DBus.Properties"/>
    </policy>

    <!-- Allow introspection -->
    <policy context="default">
        <allow send_destination="io.furios.Lmkd"
               send_interface="org.freedesktop.DBus.Introspectable"/>
        <allow receive_sender="io.furios.Lmkd"
               receive_interface="org.freedesktop.DBus.Introspectable"/>
    </policy>
</busconfig>
